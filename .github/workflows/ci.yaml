name: CI Pipeline

on:
  push:
    branches: [ dev ] 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-repo # וודא שהנתיב נכון
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel-frontend:${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel-frontend:latest

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-repo
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend:${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend:latest3

     
      - name: Clean old Docker Hub tags backend
        uses: vitorsgomes/docker-hub-garbage-collector@v1.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: "${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend"
          # הגדרה: כמה אימג'ים אחרונים להשאיר פעילים (למשל 5 האחרונים)
          keep_last: 5
      
      - name: Clean old Docker Hub tags frontend
        uses: vitorsgomes/docker-hub-garbage-collector@v1.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: "${{ secrets.DOCKERHUB_USERNAME }}/hotel-frontend"
          # הגדרה: כמה אימג'ים אחרונים להשאיר פעילים (למשל 5 האחרונים)
          keep_last: 5