name: CI Pipeline

on:
  push:
    branches: [ main ] # בהמשך נשנה ל-dev כפי שדורש המסמך

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend:latest ./backend-repo
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend:latest
