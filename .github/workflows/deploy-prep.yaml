name: Deployment Preparation

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  update-manifests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # הוספת ההרשאות הנדרשות לביצוע פעולות Git
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tags
        run: |
          # עדכון ה-Backend
          sed -i "s|image: hotel-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend:${{ github.sha }}|g" infra-repo/kubernetes/backend-deployment.yaml
          
          # עדכון ה-Frontend
          sed -i "s|image: hotel-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-frontend:${{ github.sha }}|g" infra-repo/kubernetes/frontend-deployment.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: auto-update-${{ github.sha }}
          base: main
          title: "Update deployment images to ${{ github.sha }}"
          body: "Automated PR: Updating backend and frontend image versions after successful CI build."
          commit-message: "Update image tags to ${{ github.sha }}"