name: Deployment Preparation

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  update-manifests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout infra-repo
        uses: actions/checkout@v4
        with:
          repository: your-username/infra-repo  # שנה לשם ה-Repo האמיתי שלך
          path: infra-repo                     # זה יצור את התיקייה שאתה מחפש
          token: ${{ secrets.PAT_TOKEN }}      # דורש Personal Access Token

      - name: Debug - List directory structure
        run: |
          echo "Current directory: $(pwd)"
          find . -maxdepth 4 -not -path '*/.*'

      - name: Update Image Tags
        run: |
          # שימוש במספר רץ במקום SHA
          sed -i "s|image: .*hotel-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend:${{ github.run_number }}|g" infra-repo/kubernetes/backend-deployment.yaml
          sed -i "s|image: .*hotel-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-frontend:${{ github.run_number }}|g" infra-repo/kubernetes/frontend-deployment.yaml
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: auto-update-${{ github.run_number }}
          base: main
          title: "Update deployment images to ${{ github.run_number }}"
          body: "Automated PR: Updating backend and frontend image versions after successful CI build."
          commit-message: "Update image tags to ${{ github.run_number }}"