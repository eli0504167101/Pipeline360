name: Deployment Preparation

# הפעולה תתעורר אוטומטית בכל פעם שיש Push לבראנץ' dev
on:
  push:
    branches:
      - dev

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # 1. משיכת הקוד של הציפוזיטורי (כולל תיקיית infra-repo)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. עדכון תגיות ה-Image ישירות בתיקייה המקומית
      - name: Update Image Tags
        run: |
          BACKEND_YAML="infra-repo/kubernetes/deployments/backend-deployment.yaml"
          FRONTEND_YAML="infra-repo/kubernetes/deployments/frontend-deployment.yaml"

          if [ -f "$BACKEND_YAML" ] && [ -f "$FRONTEND_YAML" ]; then
              echo "Updating image tags to ${{ github.run_number }}..."
              
              # Backend
              sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend:${{ github.run_number }}|g" "$BACKEND_YAML"

              # Frontend
              sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-frontend:${{ github.run_number }}|g" "$FRONTEND_YAML"
          else
              echo "Error: One or more deployment files not found!"
              echo "Showing current directory layout:"
              ls -la
              find . -name "backend-deployment.yaml"
              exit 1
          fi

      # 3. דחיפה אוטומטית (Push) של השינויים בחזרה ל-dev בלי אישור ידני
      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add infra-repo/kubernetes/deployments/*.yaml
          
          # בדיקה האם בכלל השתנה משהו כדי למנוע שגיאה במידה ואין שינויים
          if git diff --staged --quiet; then
            echo "No changes detected in manifests."
          else
            git commit -m "Automated image tag update to ${{ github.run_number }} [skip ci]"
            git push origin dev
          fi