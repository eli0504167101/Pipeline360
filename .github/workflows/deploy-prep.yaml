name: Deployment Preparation

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  update-manifests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      # 1. משיכת הקוד של הציפוזיטורי הנוכחי (Pipeline360) מבראנץ' dev באופן מפורש
      - name: Checkout current repo (dev branch)
        uses: actions/checkout@v4
        with:
          ref: 'dev'
          path: 'main-repo'

      # 2. בדיקה האם הטוקן מוגדר בריפוזיטורי הנוכחי
      - name: Debug Token Presence
        run: |
          if [ -z "${{ secrets.PAT_TOKEN }}" ]; then
            echo "ERROR: PAT_TOKEN is empty or not found in Secrets!"
            exit 1
          else
            echo "PAT_TOKEN is present."
          fi

      # 3. משיכת הריפוזיטורי של ה-Infra באמצעות הטוקן
      # מחק או שים בהערה את ה-Checkout הישן של ה-infra-repo, ותחליף אותו בזה:
      - name: Checkout infra-repo via Script
        run: |
          # מחיקת התיקייה אם היא קיימת מריצות קודמות כדי למנוע קונפליקט
          rm -rf infra-repo
          
          # ביצוע Clone ישיר באמצעות ה-Token של ה-Classic
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/eli0504167101/infra-repo.git infra-repo
      # 4. דיבאג מבנה תיקיות
      - name: Debug - List directory structure
        run: |
          echo "Current directory: $(pwd)"
          find . -maxdepth 4 -not -path '*/.*'

      # 5. עדכון תגיות ה-Image בקבצי ה-YAML
      - name: Update Image Tags
        run: |
          BACKEND_YAML="infra-repo/kubernetes/deployments/backend-deployment.yaml"
          FRONTEND_YAML="infra-repo/kubernetes/deployments/frontend-deployment.yaml"

          if [ -f "$BACKEND_YAML" ] && [ -f "$FRONTEND_YAML" ]; then
              echo "Updating image tags to ${{ github.run_number }}..."
              
              # Backend
              sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend:${{ github.run_number }}|g" "$BACKEND_YAML"

              # Frontend
              sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-frontend:${{ github.run_number }}|g" "$FRONTEND_YAML"
          else
              echo "Error: One or more deployment files not found!" && exit 1
          fi