name: Deployment Preparation

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  update-manifests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Image Tags
        run: |
          BACKEND_YAML="infra-repo/kubernetes/deployments/backend-deployment.yaml"
          FRONTEND_YAML="infra-repo/kubernetes/deployments/frontend-deployment.yaml"

          if [ -f "$BACKEND_YAML" ] && [ -f "$FRONTEND_YAML" ]; then
              echo "Updating image tags to ${{ github.event.workflow_run.run_number }}..."
              sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-backend:${{ github.event.workflow_run.run_number }}|g" "$BACKEND_YAML"
              sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-frontend:${{ github.event.workflow_run.run_number }}|g" "$FRONTEND_YAML"
          else
              echo "Error: One or more deployment files not found!"
              exit 1
          fi

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add infra-repo/kubernetes/deployments/*.yaml
          
          if git diff --staged --quiet; then
            echo "No changes detected in manifests."
          else
            git commit -m "Automated image tag update to ${{ github.event.workflow_run.run_number }}"
            # שימוש ב-HEAD פותר את הבעיה ב-100% כי הוא דוחף את הבראנץ' הנוכחי (main) אל deploy-dev
            git push origin HEAD:deploy-dev --force
          fi