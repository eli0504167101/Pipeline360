services:
  backend:
    build: ./backend-repo
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/hotel_db
    depends_on:
      - mongodb
    volumes:
      - ./backend-repo:/app
      - /app/node_modules

  frontend:
    build: ./frontend-repo
    ports:
      - "9000:80"
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8085:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: "admin"
      ME_CONFIG_BASICAUTH_PASSWORD: "password123"
    depends_on:
      - mongodb

volumes:
  mongo-data: