apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: pipeline360
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/eli0504167101/Pipeline360.git
    targetRevision: main
    path: infra-repo/kubernetes
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: hotel-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true