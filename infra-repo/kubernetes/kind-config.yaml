apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
    # הגדרה חשובה: מאפשרת ניתוב לתיקיות משנה בלי לשבור את האפליקציות
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - host: my-app.local
    http:
      paths:
      # תעבורה ל-Frontend
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      # תעבורה ל-Backend
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      # תעבורה ל-Mongo Express
      - path: /db(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: mongo-express-service
            port:
              number: 8081